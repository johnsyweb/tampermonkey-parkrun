[tools]
node = "22"
aube = "1.17.1"
ruby = "3.4.7"

[tasks.bootstrap]
description = "Install all project dependencies"
run = "mise install && aube install && aube run docs:install"

[tasks.setup]
description = "Prepare a fresh local checkout"
depends = ["bootstrap"]
run = "aube run build:scripts"

[tasks.update]
description = "Update dependencies and rebuild local artifacts"
depends = ["bootstrap"]
run = "aube run build:scripts && aube run update-scripts-data"

[tasks.build]
description = "Build userscripts and microsite"
run = "aube run docs:build"

[tasks.server]
description = "Serve microsite locally"
run = "aube run docs:serve"

[tasks.test]
description = "Run lint and tests"
run = "aube run lint && aube test"

[tasks.docs]
description = "Build microsite only"
run = "aube run docs:build"

[tasks.docs-check]
description = "Run microsite link checks"
run = "aube run docs:check"

[tasks.screenshots]
description = "Generate microsite screenshots"
run = "aube run screenshots"

[tasks.preview]
description = "Preview a userscript in the browser"
run = "aube run preview"

[tasks.cibuild]
description = "Run full local CI build"
run = "aube run ci"
